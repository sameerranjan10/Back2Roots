# Alumni Nexus — Alembic configuration
# Run migrations: alembic upgrade head
# Generate migration: alembic revision --autogenerate -m "description"

[alembic]
script_location     = alembic
prepend_sys_path    = .

# Override with DATABASE_URL env var at runtime
sqlalchemy.url      = mysql+pymysql://root:password@localhost:3306/alumni_db

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level    = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level    = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level    = INFO
handlers =
qualname = alembic

[handler_console]
class     = StreamHandler
args      = (sys.stderr,)
level     = NOTSET
formatter = generic

[formatter_generic]
format    = %(levelname)-5.5s [%(name)s] %(message)s
datefmt   = %H:%M:%S
