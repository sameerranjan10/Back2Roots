[pytest]
testpaths       = tests
python_files    = test_*.py
python_classes  = Test*
python_functions = test_*
asyncio_mode    = auto
addopts         =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    unit: pure unit tests (no DB)
    integration: tests that hit the DB
    slow: tests that take > 1s
