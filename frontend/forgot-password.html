<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Back2Roots</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/app-dark.css">
</head>
<body>

<div class="auth-page">
  <nav class="auth-nav">
    <div class="logo-icon">B2R</div>
    <span class="logo-text">Back2Roots</span>
  </nav>

  <div class="auth-body">
    <div class="auth-form-card" style="max-width:420px;">

      <!-- ── Step 1: Request reset ── -->
      <div id="step-forgot">
        <h2>Forgot Password?</h2>
        <p class="subtitle">Enter your email and we'll send you a reset link.</p>

        <div class="alert alert-error"   id="forgot-error"   role="alert"></div>
        <div class="alert alert-success" id="forgot-success" role="alert"></div>

        <!-- DEBUG token display (shown only in debug mode) -->
        <div id="debug-box" style="display:none;margin-bottom:14px;padding:12px;
             background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;font-size:0.85rem;">
          <strong>🔧 Dev mode — reset token:</strong><br>
          <code id="reset-token-debug" style="word-break:break-all;font-size:0.8rem;"></code><br>
          <button onclick="useToken()" class="btn btn-primary btn-sm" style="margin-top:8px;">
            Use this token →
          </button>
        </div>

        <form id="forgot-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="forgot-email">Email address</label>
            <input class="form-control" type="email" id="forgot-email"
              placeholder="you@college.edu" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="forgot-btn">
            Send Reset Link
          </button>
        </form>

        <div class="auth-footer" style="margin-top:16px;">
          <a href="login.html">← Back to Sign In</a>
        </div>
      </div>

      <!-- ── Step 2: Enter new password ── -->
      <div id="step-reset" style="display:none;">
        <h2>Set New Password</h2>
        <p class="subtitle">Enter your reset token and choose a new password.</p>

        <div class="alert alert-error"   id="reset-error"   role="alert"></div>
        <div class="alert alert-success" id="reset-success" role="alert"></div>

        <form id="reset-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="reset-token">Reset Token</label>
            <input class="form-control" type="text" id="reset-token"
              placeholder="Paste the reset token here" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="new-password">New Password</label>
            <input class="form-control" type="password" id="new-password"
              placeholder="Min 6 characters" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm-new-password">Confirm Password</label>
            <input class="form-control" type="password" id="confirm-new-password"
              placeholder="Repeat new password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="reset-btn">
            Reset Password
          </button>
        </form>

        <div class="auth-footer" style="margin-top:16px;">
          <a href="login.html">← Back to Sign In</a>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { passwordReset, toast } from './js/api.js';

  const API_BASE = 'http://localhost:8000';

  // ── Forgot form ───────────────────────────────────────────
  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('forgot-error');
    const okEl  = document.getElementById('forgot-success');
    const btn   = document.getElementById('forgot-btn');
    errEl.classList.remove('show'); okEl.classList.remove('show');

    const email = document.getElementById('forgot-email').value.trim();
    if (!email) { errEl.textContent = 'Enter your email.'; errEl.classList.add('show'); return; }

    btn.disabled = true; btn.textContent = 'Sending…';

    try {
      const res  = await fetch(`${API_BASE}/auth/forgot-password`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email }),
      });
      const data = await res.json();
      okEl.textContent = data.message; okEl.classList.add('show');

      if (data.reset_token) {
        document.getElementById('reset-token-debug').textContent = data.reset_token;
        document.getElementById('debug-box').style.display = 'block';
      }
    } catch (err) {
      errEl.textContent = err.message; errEl.classList.add('show');
    } finally {
      btn.disabled = false; btn.textContent = 'Send Reset Link';
    }
  });

  // Dev helper — auto-fill token into step 2 form
  window.useToken = function() {
    const token = document.getElementById('reset-token-debug').textContent.trim();
    document.getElementById('step-forgot').style.display = 'none';
    document.getElementById('step-reset').style.display  = 'block';
    document.getElementById('reset-token').value = token;
  };

  // ── Reset form ────────────────────────────────────────────
  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('reset-error');
    const okEl  = document.getElementById('reset-success');
    const btn   = document.getElementById('reset-btn');
    errEl.classList.remove('show'); okEl.classList.remove('show');

    const token   = document.getElementById('reset-token').value.trim();
    const pw      = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-new-password').value;

    if (!token) { errEl.textContent = 'Enter the reset token.'; errEl.classList.add('show'); return; }
    if (pw !== confirm) { errEl.textContent = 'Passwords do not match.'; errEl.classList.add('show'); return; }
    if (pw.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.classList.add('show'); return; }

    btn.disabled = true; btn.textContent = 'Resetting…';

    try {
      await passwordReset.reset(token, pw);
      okEl.textContent = 'Password reset successfully! Redirecting to login…';
      okEl.classList.add('show');
      setTimeout(() => window.location.href = 'login.html', 2000);
    } catch (err) {
      errEl.textContent = err.message; errEl.classList.add('show');
      btn.disabled = false; btn.textContent = 'Reset Password';
    }
  });

  // Show step 2 if ?step=reset is in URL
  if (new URLSearchParams(window.location.search).get('step') === 'reset') {
    document.getElementById('step-forgot').style.display = 'none';
    document.getElementById('step-reset').style.display  = 'block';
  }
</script>

</body>
</html>
