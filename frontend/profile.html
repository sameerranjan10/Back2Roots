<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Back2Roots</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/app-dark.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="dashboard.html" class="nav-logo">
      <div class="logo-icon">B2R</div>
      <span class="logo-text">Back2Roots</span>
    </a>
    <div class="nav-search" style="position:relative;">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search…" id="global-search-input" autocomplete="off">
    </div>
    <div class="nav-links">
      <a class="nav-link" href="dashboard.html"><span class="nav-icon">🏠</span><span>Home</span></a>
      <a class="nav-link" href="chat.html"><span class="nav-icon">💬</span><span>Messages</span></a>
      <a class="nav-link active" href="profile.html"><span class="nav-icon">👤</span><span>Profile</span></a>
      <div class="nav-avatar" id="nav-user-avatar">?</div>
      <button id="logout-btn" class="btn btn-ghost btn-sm" style="margin-left:4px;">Sign out</button>
    </div>
  </div>
</nav>

<main style="max-width:900px;margin:24px auto;padding:0 20px;">

  <!-- Profile card -->
  <div class="profile-main-card" style="margin-bottom:16px;">
    <div class="profile-banner" id="profile-banner"></div>
    <div class="profile-main-info">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div class="profile-main-avatar" id="profile-avatar">?</div>
        <div id="profile-actions" style="padding-bottom:4px;display:flex;gap:10px;flex-wrap:wrap;"></div>
      </div>
      <h1 class="profile-main-name" id="profile-name">Loading…</h1>
      <div class="profile-main-title" id="profile-role"></div>
      <div class="profile-main-college">
        <span>🏛️</span> <span id="profile-college">—</span>
      </div>
      <div id="profile-bio" style="margin-top:12px;font-size:0.95rem;color:var(--text-secondary);line-height:1.7;">Loading…</div>
      <div class="skills-section" style="margin-top:16px;">
        <h4>Skills</h4>
        <div class="skills-list" id="profile-skills-list">
          <div class="skeleton skeleton-line" style="width:200px;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Posts -->
  <div class="card">
    <div class="card-header"><h3>📝 Activity</h3></div>
    <div id="user-posts-feed" style="padding:12px 0;">
      <div class="loading-spinner"></div>
    </div>
  </div>

</main>

<!-- Edit Profile Modal -->
<div class="modal-overlay" id="edit-profile-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✏️ Edit Profile</span>
      <button class="modal-close" id="edit-profile-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label" for="edit-name">Full Name</label>
        <input class="form-control" type="text" id="edit-name" maxlength="100">
      </div>
      <div class="form-group">
        <label class="form-label" for="edit-college">College / University</label>
        <input class="form-control" type="text" id="edit-college">
      </div>
      <div class="form-group">
        <label class="form-label" for="edit-skills">
          Skills <span style="color:var(--text-muted);font-weight:400;">(comma-separated)</span>
        </label>
        <input class="form-control" type="text" id="edit-skills" placeholder="Python, React, ML">
      </div>
      <div class="form-group">
        <label class="form-label" for="edit-bio">Bio</label>
        <textarea class="form-control" id="edit-bio" rows="3" maxlength="1000"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Profile Picture</label>
        <input class="form-control" type="url" id="edit-pic" placeholder="https://…" style="margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <label id="avatar-upload-label" class="btn btn-ghost btn-sm" style="cursor:pointer;margin:0;">
            📁 Upload Photo
            <input type="file" id="avatar-file-input" accept="image/*" style="display:none;">
          </label>
          <span style="font-size:0.78rem;color:var(--text-muted);">Max 5 MB · JPEG, PNG, WebP</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="edit-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="save-profile-btn">Save Changes</button>
    </div>
  </div>
</div>

<!-- Mentorship Request Modal -->
<div class="modal-overlay" id="mentorship-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">🎓 Request Mentorship</span>
      <button class="modal-close" id="mentorship-modal-close">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="mentorship-alumni-id">
      <p style="margin-bottom:14px;font-size:0.9rem;color:var(--text-secondary);">
        Sending request to <strong id="mentorship-alumni-name"></strong>
      </p>
      <div class="form-group">
        <label class="form-label">Your message (optional)</label>
        <textarea class="form-control" id="mentorship-message" rows="4" maxlength="500"
          placeholder="Introduce yourself and describe what you'd like guidance on…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost"   id="mentorship-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="mentorship-submit">Send Request</button>
    </div>
  </div>
</div>

<script type="module" src="js/profile.js"></script>
</body>
</html>
