# ══════════════════════════════════════════════════════════
#  Back2Roots — Nginx configuration
#  • HTTP  (port 80)  → redirect to HTTPS
#  • HTTPS (port 443) → serve frontend + proxy API
#
#  SSL: generate a self-signed cert for dev, or use
#  Certbot / Let's Encrypt for production:
#    certbot --nginx -d yourdomain.com
# ══════════════════════════════════════════════════════════

# ── HTTP → HTTPS redirect ─────────────────────────────────
server {
    listen      80;
    listen [::]:80;
    server_name _;

    # ACME challenge for Let's Encrypt (production)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────
server {
    listen      443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # SSL certificates
    # For production replace with real cert paths:
    #   ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Modern SSL settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # HSTS (enables for 1 year; include subdomains and preload in prod)
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Security headers ───────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"     always;
    add_header X-Frame-Options         "SAMEORIGIN"  always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "same-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ──────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/wasm;
    gzip_min_length 1000;

    # ── API reverse proxy ──────────────────────────────────
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 10m;  # allow 10 MB uploads
    }

    # Direct Swagger / health access
    location ~ ^/(docs|redoc|openapi\.json|health)$ {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Uploaded static files
    location /static/uploads/ {
        alias /usr/share/nginx/uploads/;
        expires   30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # ── Frontend static files ──────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff2?|ttf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }

    # Prevent access to dotfiles
    location ~ /\. {
        deny all;
    }
}
